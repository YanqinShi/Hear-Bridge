				<!-- 核心逻辑脚本 -->
				<script>
					function playSignLanguage() {
						var input = document.getElementById('signInput').value.trim();
						var videoElement = document.getElementById('signLanguageVideo');
						var videoSource = document.getElementById('videoSource');
						var errorTips = document.getElementById('errorTips');

						// 词义与视频文件路径的对应关系
						// 请确保这些文件确实存在于 static/video/ 目录下
						var videoMap = {
							"你好": "static/video/nihao.mp4",
							"你吃了吗？吃了什么？": "static/video/chilema.mp4",
							"我的衣服送去干洗了但是还是缩水了": "static/video/chileshenme.mp4",
							"今天要干什么": "static/video/ganshenme.mp4"
						};

						if (videoMap[input]) {
							errorTips.style.display = 'none';
							// 切换视频路径
							videoSource.src = videoMap[input];
							// 核心：重新加载视频并播放
							videoElement.load();
							videoElement.play();
						} else {
							errorTips.style.display = 'block';
						}
					}

					// 监听回车键
					document.getElementById('signInput').onkeypress = function(e){
						if (!e) e = window.event;
						if (e.keyCode == '13'){
							playSignLanguage();
							return false;
						}
					}
				</script>
